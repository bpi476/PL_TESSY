<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="logo.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricelist</title>
</head>

<body>

  <div class="app-container">

    <h1>PLnya TESSY</h1>
    <h3 class="warning">Jangan Share Link!!! cukup screenshot</h3>

    <div id="menu">Loading menu...</div>
    <input type="text" id="search" placeholder="Cari produk...">

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Produk</th>
            <th>Ukuran</th>
            <th>Harga</th>
            <th>Satuan</th>
          </tr>
        </thead>
        <tbody id="tabel"></tbody>
      </table>
    </div>

  </div>

  <script>
    // ===== CONFIG & DATA =====
    const sheetID = "1m-MFmrKUysTBYDmXAP5JqZoChLIa0Rd99d4nO1yH6RE";
    let currentData = [];

    // ===== LOGIN USER LIST =====
    const users = [
      { username: "admin", password: "12345" },
      { username: "sales", password: "mustopa" },
      { username: "salesDPJ", password: "ciamik123" }
    ];

    // ===== SYSTEM LOGIN INTEGRATION =====
    function checkLogin() {
      if (localStorage.getItem("login") === "true") {
        initApp(); // Jika sudah login, langsung jalankan aplikasi
      } else {
        showLogin();
      }
    }

    function showLogin() {
      document.body.classList.add("lock");

      // Sembunyikan kontainer utama dengan aman agar tidak diintip
      const container = document.querySelector(".app-container");
      if (container) container.style.visibility = "hidden";

      const div = document.createElement("div");
      div.id = "loginBox";

      div.innerHTML = `
        <div class="login-card">
          <h3>Login</h3>
          <input id="user" placeholder="Username">
          <input id="pass" type="password" placeholder="Password">
          <button onclick="login()">Masuk</button>
        </div>
      `;

      document.body.appendChild(div);
    }

    function login() {
      const u = document.getElementById("user").value;
      const p = document.getElementById("pass").value;

      const found = users.find(x => x.username === u && x.password === p);

      if (found) {
        localStorage.setItem("login", "true");
        document.body.classList.remove("lock");
        document.getElementById("loginBox").remove();
        
        // Munculkan kembali kontainer utama
        const container = document.querySelector(".app-container");
        if (container) container.style.visibility = "visible";
        
        initApp(); // Jalankan load data API
      } else {
        alert("Username / Password salah");
      }
    }

    // ===== INITIALIZE APPLICATION (FETCH DATA) =====
    function initApp() {
      // Mengambil data menu kategori dari Google Sheet secara aman
      fetch(`https://opensheet.elk.sh/${sheetID}/kategori`)
      .then(res => res.json())
      .then(data => {
        let html = "";
        data.forEach(item => {
          html += `<button onclick="loadSheet('${item.nama_sheet}', this)">
            ${item.label}
          </button>`;
        });
        document.getElementById("menu").innerHTML = html;

        if (data.length > 0) {
          loadSheet(data[0].nama_sheet);
        }
      })
      .catch(() => {
        document.getElementById("menu").innerHTML = "Gagal memuat menu";
      });
    }

    // JALANKAN PROSES CEK LOGIN PERTAMA KALI
    checkLogin();

    // ===== LOAD SHEET DATA =====
    function loadSheet(nama, btn) {
      document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

      if (btn) {
        document.querySelectorAll("#menu button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      }

      fetch(`https://opensheet.elk.sh/${sheetID}/${nama}`)
      .then(res => res.json())
      .then(data => {
        currentData = data;
        tampilkan(data);
      })
      .catch(() => {
        document.getElementById("tabel").innerHTML = "<tr><td colspan='4'>Gagal load data</td></tr>";
      });
    }

    // AUTOMATIC COLUMN VALUE DETECTION
    function getVal(item, keys) {
      for (let k in item) {
        let key = k.toLowerCase();
        for (let x of keys) {
          if (key.includes(x)) return item[k];
        }
      }
      return "";
    }

    // DISPLAY TABLE
    function tampilkan(data) {
      let html = "";
      data.forEach(i => {
        html += `<tr>
          <td>${getVal(i, ["produk","nama"])}</td>
          <td>${getVal(i, ["ukuran","ukuran"])}</td>
          <td>${formatRupiah(getVal(i, ["harga"]))}</td>
          <td>${getVal(i, ["satuan"])}</td>
        </tr>`;
      });

      document.getElementById("tabel").innerHTML = html || "<tr><td colspan='4'>Kosong</td></tr>";
    }

    // CURRENCY FORMATTER
    function formatRupiah(a) {
      if (!a) return "";
      a = String(a).replace(/[^0-9]/g, "");
      return Number(a).toLocaleString("id-ID");
    }

    // SEARCH FILTER FUNCTION
    document.getElementById("search").addEventListener("keyup", function() {
      let k = this.value.toLowerCase();
      let hasil = currentData.filter(i =>
        getVal(i, ["produk","nama"]).toLowerCase().includes(k)
      );
      tampilkan(hasil);
    });
  </script>

</body>
</html>
